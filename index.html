<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Festiplanner</title>
  <link rel="stylesheet" href="festiplanner.css">
</head>
<body class="home-page fp-home">
  <div class="fp-shell">
    <header class="fp-topbar">
      <a class="fp-wordmark" href="index.html">Festiplanner</a>
      <a class="fp-settings-link" href="settings.html" aria-label="Settings">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19.14 12.94a7.8 7.8 0 0 0 .05-.94 7.8 7.8 0 0 0-.05-.94l2.03-1.58-1.92-3.32-2.39.96a7.25 7.25 0 0 0-1.62-.94L14.88 3h-3.84l-.36 3.18c-.58.24-1.12.55-1.62.94l-2.39-.96-1.92 3.32 2.03 1.58a7.8 7.8 0 0 0-.05.94c0 .32.02.63.05.94l-2.03 1.58 1.92 3.32 2.39-.96c.5.39 1.04.7 1.62.94l.36 3.18h3.84l.36-3.18c.58-.24 1.12-.55 1.62-.94l2.39.96 1.92-3.32-2.03-1.58ZM12.96 15.5a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7Z"/></svg>
        <span>Settings</span>
      </a>
    </header>

    <main class="fp-main">
      <section class="fp-page-head">
        <h1>Festival Hub</h1>
      </section>

      <label class="fp-search">
        <span>Search festivals</span>
        <input id="festivalSearch" type="search" placeholder="Search festivals">
      </label>

      <section class="fp-featured" id="featuredFestival" data-festival-card>
        <img src="assets/festival-crowd-discovery.png" alt="Festival crowd at dusk">
        <div class="fp-featured-content">
          <h2 id="featuredName">Loading festival</h2>
          <span id="featuredDates"></span>
          <p class="fp-countdown" id="featuredCountdown" aria-live="polite">Calculating countdown</p>
          <p id="featuredLocation"></p>
          <a class="fp-primary-button" id="featuredLink" href="packing.html">Open planner</a>
        </div>
        <button class="fp-featured-pin" id="featuredPin" type="button" aria-label="Pin festival" aria-pressed="false">☆</button>
      </section>

      <section class="fp-section" id="pinnedFestivalsSection">
        <div class="fp-section-title">
          <h2>Pinned Festivals</h2>
        </div>
        <div class="fp-festival-list" id="pinnedFestivalList"></div>
        <p class="fp-empty-state" id="pinnedEmptyState">Pin festivals to keep them close.</p>
      </section>

      <section class="fp-section" id="allFestivalsSection">
        <div class="fp-section-title">
          <h2>All Festivals</h2>
        </div>
        <div class="fp-festival-list" id="allFestivalList"></div>
      </section>
    </main>
  </div>

  <script src="festival-data.js"></script>
  <script src="home.js"></script>
  <script src="festiplanner-i18n.js"></script>
</body>
</html>
